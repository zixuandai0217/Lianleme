# 本地开发环境：热重载 + 代码挂载，不限内存
#
# ── 镜像分层策略 ──────────────────────────────────────────────────────────────
# [步骤 1] 首次 / 依赖变更时，构建基础镜像（含所有 Python 包，耗时约 2-3 min）：
#   docker build -f infra/docker/backend-base.dockerfile \
#                -t lianleme-base:latest backend/
#
# [步骤 2] 日常代码更新，只重建 app 镜像（仅 COPY 代码，秒级完成）：
#   docker build -f infra/docker/backend.dockerfile \
#                -t lianleme-backend:latest backend/
#   （自动覆盖上一次的 latest 镜像，然后 docker compose up -d 即可）
#
# 开发模式（下方 volumes 挂载 + --reload）无需重建镜像，修改代码即生效。
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lianleme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lianle123}
      POSTGRES_DB: ${POSTGRES_DB:-lianleme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "127.0.0.1:5432:5432"   # 仅本机可访问
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lianleme}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"   # 仅本机可访问
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --save 900 1 --save 300 10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9000:9000"   # 仅本机可访问
      - "127.0.0.1:9001:9001"   # MinIO 控制台，仅本机可访问
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/backend.dockerfile
    image: lianleme-backend:latest   # 每次构建自动覆盖 latest 标签
    ports:
      - "127.0.0.1:8000:8000"   # 仅本机可访问
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../backend:/app   # 挂载源码，支持热重载
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_data:
