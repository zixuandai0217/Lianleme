version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lianleme
      POSTGRES_PASSWORD: lianleme
      POSTGRES_DB: lianleme
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: profile-service
      PORT: 8010
    ports:
      - "8010:8010"

  ai-coach-service:
    build:
      context: ./services/ai-coach-service
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: ai-coach-service
      PORT: 8020
      TEXT_MODEL: deepseek-v3.2
      VISION_MODEL: qwen3-vl-flash
    ports:
      - "8020:8020"

  task-service:
    build:
      context: ./services/task-service
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: task-service
      PORT: 8030
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8030:8030"

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: api-gateway
      PORT: 8000
      PROFILE_SERVICE_BASE_URL: http://profile-service:8010
      AI_COACH_SERVICE_BASE_URL: http://ai-coach-service:8020
      TASK_SERVICE_BASE_URL: http://task-service:8030
    depends_on:
      - profile-service
      - ai-coach-service
      - task-service
    ports:
      - "8000:8000"

volumes:
  pg_data: