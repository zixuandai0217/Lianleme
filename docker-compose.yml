version: "3.9"

services:
  postgres:
    # shift exposed host ports away from common local defaults; Docker host bindings only; verify with docker compose up and /health checks on the listed ports
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lianleme
      POSTGRES_PASSWORD: lianleme
      POSTGRES_DB: lianleme
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: profile-service
      PORT: 18010
    ports:
      - "18010:18010"

  ai-coach-service:
    build:
      context: ./services/ai-coach-service
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: ai-coach-service
      PORT: 18020
      TEXT_MODEL: deepseek-v3.2
      VISION_MODEL: qwen3-vl-flash
    ports:
      - "18020:18020"

  task-service:
    build:
      context: ./services/task-service
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: task-service
      PORT: 18030
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "18030:18030"

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../infra/docker/python-service.Dockerfile
    environment:
      SERVICE_NAME: api-gateway
      PORT: 18000
      PROFILE_SERVICE_BASE_URL: http://profile-service:18010
      AI_COACH_SERVICE_BASE_URL: http://ai-coach-service:18020
      TASK_SERVICE_BASE_URL: http://task-service:18030
    depends_on:
      - profile-service
      - ai-coach-service
      - task-service
    ports:
      - "18000:18000"

volumes:
  pg_data:
