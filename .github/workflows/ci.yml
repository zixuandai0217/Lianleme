name: ci

on:
  push:
  pull_request:

jobs:
  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, profile-service, ai-coach-service, task-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pytest -q

  admin-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --workspace apps/admin-console --legacy-peer-deps
      - run: npm run --workspace apps/admin-console build